<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagrama de Energía MAS | PhysicsLab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --bg: #050510;
            --bg2: #0a0a1a;
            --bg3: #101028;
            --card: rgba(255, 255, 255, .03);
            --bdr: rgba(120, 130, 255, .1);
            --t1: #e8eaff;
            --t2: #8b8db5;
            --t3: #5a5c80;
            --acc: #a78bfa;
            --acc2: #7c3aed;
            --accg: rgba(167, 139, 250, .25);
            --grn: #4ade80;
            --red: #fb7185;
            --ylw: #facc15;
            --cyn: #22d3ee;
            --pnk: #f472b6;
            --orn: #fb923c;
            --neon-blue: #60a5fa;
            --neon-purple: #c084fc;
            --neon-green: #4ade80;
            --neon-pink: #f472b6;
            --r: 12px;
            --font: 'Inter', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--t1);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, .06) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(34, 211, 238, .04) 0%, transparent 50%)
        }

        ::-webkit-scrollbar {
            width: 5px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--acc2);
            border-radius: 3px
        }

        .header {
            background: linear-gradient(135deg, rgba(124, 58, 237, .12), rgba(34, 211, 238, .06), rgba(244, 114, 182, .06));
            border-bottom: 1px solid rgba(167, 139, 250, .15);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(20px);
            box-shadow: 0 1px 30px rgba(124, 58, 237, .08)
        }

        .header .logo {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--neon-purple), var(--cyn));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
            box-shadow: 0 0 15px rgba(192, 132, 252, .3);
            animation: logo-pulse 3s ease-in-out infinite
        }

        @keyframes logo-pulse {

            0%,
            100% {
                box-shadow: 0 0 15px rgba(192, 132, 252, .3)
            }

            50% {
                box-shadow: 0 0 25px rgba(192, 132, 252, .5)
            }
        }

        .header h1 {
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-purple), var(--cyn), var(--neon-pink));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: title-shift 4s ease-in-out infinite
        }

        @keyframes title-shift {

            0%,
            100% {
                background-position: 0% center
            }

            50% {
                background-position: 100% center
            }
        }

        .header .badge {
            font-size: 9px;
            background: var(--accg);
            color: var(--acc);
            padding: 2px 7px;
            border-radius: 20px;
            font-weight: 600
        }

        .app {
            display: grid;
            grid-template-rows: 1fr auto auto;
            height: calc(100vh - 54px)
        }

        /* MAIN CANVAS AREA */
        .main-area {
            position: relative;
            background: radial-gradient(ellipse at center, rgba(124, 58, 237, .04) 0%, var(--bg) 70%);
            overflow: hidden;
            border-bottom: 1px solid rgba(167, 139, 250, .08)
        }

        #mainCanvas {
            width: 100%;
            height: 100%;
            display: block
        }

        /* OVERLAY CHIPS */
        .overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 6px;
            z-index: 5;
            flex-wrap: wrap
        }

        .chip {
            background: rgba(10, 10, 30, .75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(167, 139, 250, .12);
            border-radius: 7px;
            padding: 4px 9px;
            font-size: 10px;
            font-family: var(--mono);
            color: var(--t2);
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .3)
        }

        .chip .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%
        }

        /* CONTROLS BAR */
        .controls-bar {
            background: linear-gradient(180deg, rgba(10, 10, 26, .95), rgba(5, 5, 16, .98));
            border-top: 1px solid rgba(167, 139, 250, .1);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, .3)
        }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .ctrl-group label {
            font-size: 11px;
            color: var(--t2);
            font-weight: 600;
            white-space: nowrap
        }

        .ctrl-group .val {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--acc);
            min-width: 45px;
            text-align: right
        }

        .ctrl-group input[type=range] {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(90deg, rgba(124, 58, 237, .2), rgba(34, 211, 238, .15));
            outline: none
        }

        .ctrl-group input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--neon-purple);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(192, 132, 252, .5), 0 0 20px rgba(192, 132, 252, .2);
            transition: box-shadow .2s
        }

        .ctrl-group input[type=range]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 12px rgba(192, 132, 252, .7), 0 0 30px rgba(192, 132, 252, .3)
        }

        .sep {
            width: 1px;
            height: 24px;
            background: var(--bdr)
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 7px;
            border: 1px solid var(--bdr);
            background: var(--card);
            color: var(--t1);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: var(--font)
        }

        .btn:hover {
            background: rgba(255, 255, 255, .07);
            border-color: var(--acc)
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--acc2), rgba(34, 211, 238, .6));
            border-color: transparent;
            color: #fff;
            box-shadow: 0 0 10px rgba(124, 58, 237, .3)
        }

        .btn.primary:hover {
            box-shadow: 0 0 20px rgba(124, 58, 237, .5), 0 0 40px rgba(34, 211, 238, .2)
        }

        .btn.danger {
            border-color: rgba(251, 113, 133, .4);
            color: var(--red);
            text-shadow: 0 0 8px rgba(251, 113, 133, .3)
        }

        .btn.danger:hover {
            background: rgba(251, 113, 133, .1);
            box-shadow: 0 0 15px rgba(251, 113, 133, .15)
        }

        .btn.active {
            background: linear-gradient(135deg, var(--acc2), var(--cyn));
            border-color: transparent;
            color: #fff;
            box-shadow: 0 0 15px rgba(124, 58, 237, .4)
        }

        /* DATA STRIP */
        .data-strip {
            display: flex;
            gap: 2px;
            padding: 0 6px;
            align-items: center
        }

        .data-chip {
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(15, 15, 35, .6);
            border: 1px solid rgba(167, 139, 250, .08);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
            backdrop-filter: blur(5px);
            transition: border-color .3s, box-shadow .3s
        }

        .data-chip:hover {
            border-color: rgba(167, 139, 250, .2);
            box-shadow: 0 0 12px rgba(167, 139, 250, .08)
        }

        .data-chip .dl {
            font-size: 8px;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: .4px;
            font-weight: 600
        }

        .data-chip .dv {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700
        }

        .data-chip.c-acc .dv {
            color: var(--acc)
        }

        .data-chip.c-grn .dv {
            color: var(--grn)
        }

        .data-chip.c-red .dv {
            color: var(--red)
        }

        .data-chip.c-ylw .dv {
            color: var(--ylw)
        }

        .data-chip.c-cyn .dv {
            color: var(--cyn)
        }

        .data-chip.c-pnk .dv {
            color: var(--pnk)
        }

        .data-chip.c-orn .dv {
            color: var(--orn)
        }

        /* GRAPHS PANEL */
        .graphs-panel {
            background: var(--bg2);
            border-top: 1px solid rgba(167, 139, 250, .08);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            padding: 3px;
            height: 165px
        }

        .graph-cell {
            background: rgba(5, 5, 16, .9);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(167, 139, 250, .05);
            transition: border-color .3s
        }

        .graph-cell:hover {
            border-color: rgba(167, 139, 250, .15);
            box-shadow: 0 0 15px rgba(124, 58, 237, .08)
        }

        .graph-cell canvas {
            width: 100%;
            height: 100%;
            display: block
        }

        .graph-label {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 9px;
            font-weight: 700;
            color: rgba(255, 255, 255, .5);
            pointer-events: none;
            z-index: 2;
            font-family: var(--mono);
            text-shadow: 0 0 8px currentColor
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes pulse-dot {

            0%,
            100% {
                box-shadow: 0 0 4px var(--grn)
            }

            50% {
                box-shadow: 0 0 12px var(--grn)
            }
        }

        /* RESPONSIVE */
        @media(max-width:768px) {
            .controls-bar {
                flex-direction: column;
                gap: 8px
            }

            .graphs-panel {
                grid-template-columns: repeat(3, 1fr);
                height: 200px
            }

            .ctrl-group input[type=range] {
                width: 70px
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo"><i class="fa-solid fa-chart-line"></i></div>
        <h1>Diagrama Energético — M.A.S.</h1>
        <span class="badge"><i class="fa-solid fa-atom"></i> PhysicsLab</span>
    </div>

    <div class="app">
        <!-- MAIN CANVAS -->
        <div class="main-area">
            <canvas id="mainCanvas"></canvas>
            <div class="overlay">
                <div class="chip">
                    <div class="dot" id="sDot" style="background:var(--ylw)"></div><span id="sText">Pausado</span>
                </div>
                <div class="chip"><i class="fa-solid fa-clock" style="color:var(--acc)"></i> t = <span
                        id="tChip">0.000</span> s</div>
                <div class="chip"><i class="fa-solid fa-wave-square" style="color:var(--orn)"></i> ω = <span
                        id="wChip">0.000</span> rad/s</div>
                <div class="chip"><i class="fa-solid fa-stopwatch" style="color:var(--grn)"></i> T = <span
                        id="TChip">0.000</span> s</div>
            </div>
        </div>

        <!-- CONTROLS + DATA -->
        <div class="controls-bar">
            <div class="ctrl-group"><label>A (cm)</label><input type="range" id="sA" min="5" max="40" step="1"
                    value="30"><span class="val" id="vA">30</span></div>
            <div class="ctrl-group"><label>k (N/m)</label><input type="range" id="sK" min="5" max="100" step="1"
                    value="40"><span class="val" id="vK">40</span></div>
            <div class="ctrl-group"><label>m (kg)</label><input type="range" id="sM" min="1" max="30" step="0.5"
                    value="10"><span class="val" id="vM">10.0</span></div>
            <div class="sep"></div>
            <button class="btn primary" id="btnPlay" onclick="toggleSim()"><i class="fa-solid fa-play"></i> <span
                    id="btnPlayText">Iniciar</span></button>
            <button class="btn danger" onclick="resetSim()"><i class="fa-solid fa-rotate-left"></i> Reset</button>
            <button class="btn" onclick="clearHist()"><i class="fa-solid fa-eraser"></i> Borrar</button>
            <div class="sep"></div>
            <div class="data-strip">
                <div class="data-chip c-acc">
                    <div class="dl">x (cm)</div>
                    <div class="dv" id="dX">0.00</div>
                </div>
                <div class="data-chip c-grn">
                    <div class="dl">v (m/s)</div>
                    <div class="dv" id="dV">0.00</div>
                </div>
                <div class="data-chip c-ylw">
                    <div class="dl">a (m/s²)</div>
                    <div class="dv" id="dAcc">0.00</div>
                </div>
                <div class="data-chip c-cyn">
                    <div class="dl">Ek (J)</div>
                    <div class="dv" id="dKE">0.00</div>
                </div>
                <div class="data-chip c-pnk">
                    <div class="dl">Ep (J)</div>
                    <div class="dv" id="dPE">0.00</div>
                </div>
                <div class="data-chip c-orn">
                    <div class="dl">E total (J)</div>
                    <div class="dv" id="dET">0.00</div>
                </div>
            </div>
        </div>

        <!-- GRAPHS -->
        <div class="graphs-panel">
            <div class="graph-cell"><span class="graph-label" style="color:#818cf8">x(t)</span><canvas id="gX"></canvas>
            </div>
            <div class="graph-cell"><span class="graph-label" style="color:#34d399">v(t)</span><canvas id="gV"></canvas>
            </div>
            <div class="graph-cell"><span class="graph-label" style="color:#fbbf24">a(t)</span><canvas id="gA"></canvas>
            </div>
            <div class="graph-cell"><span class="graph-label" style="color:#22d3ee">Ek(t)</span><canvas
                    id="gKE"></canvas></div>
            <div class="graph-cell"><span class="graph-label" style="color:#f472b6">Ep(t)</span><canvas
                    id="gPE"></canvas></div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // PHYSICS STATE
        // ═══════════════════════════════════════
        const S = {
            A: 0.30, k: 40, m: 10,
            x: 0, v: 0, t: 0, running: false,
            dt: 1 / 120,
            hist: { t: [], x: [], v: [], a: [], ke: [], pe: [] },
            maxH: 4000,
            trail: [],     // array of {xcm, pyEp, pxCur, y0} positions
            trailMax: 35   // how many ghost positions to keep
        };

        function omega() { return Math.sqrt(S.k / S.m); }
        function period() { return 2 * Math.PI / omega(); }

        // ═══════════════════════════════════════
        // MAIN CANVAS
        // ═══════════════════════════════════════
        const mc = document.getElementById('mainCanvas');
        const mx = mc.getContext('2d');
        let W, H, dp;

        function resize() {
            dp = devicePixelRatio || 1;
            const r = mc.parentElement.getBoundingClientRect();
            W = r.width; H = r.height;
            mc.width = W * dp; mc.height = H * dp;
            mx.setTransform(dp, 0, 0, dp, 0, 0);
        }
        addEventListener('resize', resize); resize();

        // Coordinate system for energy diagram
        function getCoords() {
            const padL = 80, padR = 40, padT = 40, padB = 80;
            const plotW = W - padL - padR;
            const plotH = H - padT - padB;
            // x range: from -maxX to +maxX in cm
            const maxXcm = Math.max(S.A * 100 + 10, 45);
            // E range: 0 to Emax
            const Etotal = 0.5 * S.k * S.A * S.A;
            const Emax = Math.max(Etotal * 1.4, 1);
            return {
                padL, padR, padT, padB, plotW, plotH, maxXcm, Emax, Etotal,
                // convert physics to pixel
                xToP: (xcm) => padL + ((xcm + maxXcm) / (2 * maxXcm)) * plotW,
                eToP: (e) => padT + plotH - (e / Emax) * plotH,
                pToXcm: (px) => ((px - padL) / plotW) * 2 * maxXcm - maxXcm
            };
        }

        function drawMain() {
            mx.clearRect(0, 0, W, H);
            const c = getCoords();
            const Acm = S.A * 100;
            const xcm = S.x * 100;
            const Etotal = c.Etotal;
            const Ep = 0.5 * S.k * S.x * S.x;
            const Ek = Math.max(Etotal - Ep, 0);

            // ── Background grid (graph paper) ──
            mx.save();
            // subtle radial glow at center
            const grd = mx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.6);
            grd.addColorStop(0, 'rgba(124,58,237,0.015)');
            grd.addColorStop(1, 'transparent');
            mx.fillStyle = grd;
            mx.fillRect(0, 0, W, H);
            mx.strokeStyle = 'rgba(120,130,255,0.035)';
            mx.lineWidth = 0.5;
            for (let px = c.padL; px <= W - c.padR; px += 20) { mx.beginPath(); mx.moveTo(px, c.padT); mx.lineTo(px, c.padT + c.plotH); mx.stroke(); }
            for (let py = c.padT; py <= c.padT + c.plotH; py += 20) { mx.beginPath(); mx.moveTo(c.padL, py); mx.lineTo(W - c.padR, py); mx.stroke(); }
            mx.restore();

            // ── Axes ──
            mx.save();
            mx.strokeStyle = 'rgba(167,139,250,0.2)';
            mx.lineWidth = 1.5;
            // X axis (E=0)
            const y0 = c.eToP(0);
            mx.beginPath(); mx.moveTo(c.padL, y0); mx.lineTo(W - c.padR, y0); mx.stroke();
            // E axis (x=0)
            const x0 = c.xToP(0);
            mx.beginPath(); mx.moveTo(x0, c.padT); mx.lineTo(x0, c.padT + c.plotH); mx.stroke();
            mx.restore();

            // ── X axis ticks ──
            mx.save();
            mx.fillStyle = 'rgba(255,255,255,0.35)';
            mx.strokeStyle = 'rgba(255,255,255,0.15)';
            mx.lineWidth = 1;
            mx.font = '10px "JetBrains Mono",monospace';
            mx.textAlign = 'center';
            const xStep = c.maxXcm > 30 ? 10 : 5;
            for (let t = -Math.floor(c.maxXcm / xStep) * xStep; t <= c.maxXcm; t += xStep) {
                const px = c.xToP(t);
                mx.beginPath(); mx.moveTo(px, y0); mx.lineTo(px, y0 + 5); mx.stroke();
                if (t !== 0) mx.fillText(t, px, y0 + 16);
            }
            mx.fillStyle = 'rgba(255,255,255,0.4)';
            mx.font = 'bold 11px Inter,sans-serif';
            mx.fillText('x (cm)', W - c.padR + 5, y0 + 5);
            mx.restore();

            // ── E axis ticks ──
            mx.save();
            mx.fillStyle = 'rgba(255,255,255,0.35)';
            mx.strokeStyle = 'rgba(255,255,255,0.15)';
            mx.lineWidth = 1;
            mx.font = '10px "JetBrains Mono",monospace';
            mx.textAlign = 'right';
            const eStep = c.Emax > 5 ? 1 : (c.Emax > 2 ? 0.5 : 0.2);
            for (let e = eStep; e < c.Emax; e += eStep) {
                const py = c.eToP(e);
                mx.beginPath(); mx.moveTo(x0 - 4, py); mx.lineTo(x0, py); mx.stroke();
                mx.fillText(e.toFixed(1), x0 - 8, py + 4);
            }
            mx.fillStyle = 'rgba(255,255,255,0.5)';
            mx.font = 'bold 12px Inter,sans-serif';
            mx.textAlign = 'center';
            mx.fillText('E (J)', x0 + 20, c.padT - 10);
            mx.restore();

            // ── Parabola: Ep = 0.5*k*x^2 ──
            mx.save();
            mx.beginPath();
            for (let px = c.padL; px <= W - c.padR; px += 1) {
                const xm = c.pToXcm(px) / 100;
                const ep = 0.5 * S.k * xm * xm;
                const py = c.eToP(ep);
                if (px === c.padL) mx.moveTo(px, py); else mx.lineTo(px, py);
            }
            // Outer glow
            mx.strokeStyle = 'rgba(96,165,250,0.12)';
            mx.lineWidth = 16;
            mx.stroke();
            // Mid glow
            mx.strokeStyle = 'rgba(96,165,250,0.25)';
            mx.lineWidth = 6;
            mx.stroke();
            // Core line
            mx.strokeStyle = '#60a5fa';
            mx.lineWidth = 2.5;
            mx.shadowColor = 'rgba(96,165,250,0.6)';
            mx.shadowBlur = 15;
            mx.stroke();
            mx.shadowBlur = 0;
            mx.restore();

            // ── Total energy line (green) ──
            mx.save();
            const yE = c.eToP(Etotal);
            // Glow
            mx.strokeStyle = 'rgba(74,222,128,0.08)';
            mx.lineWidth = 12;
            mx.beginPath(); mx.moveTo(c.padL, yE); mx.lineTo(W - c.padR, yE); mx.stroke();
            // Core
            mx.strokeStyle = '#4ade80';
            mx.lineWidth = 2;
            mx.shadowColor = 'rgba(74,222,128,0.5)';
            mx.shadowBlur = 12;
            mx.beginPath(); mx.moveTo(c.padL, yE); mx.lineTo(W - c.padR, yE); mx.stroke();
            mx.shadowBlur = 0;
            // Label
            mx.fillStyle = '#4ade80';
            mx.font = 'bold 11px Inter,sans-serif';
            mx.textAlign = 'left';
            mx.shadowColor = 'rgba(74,222,128,0.4)';
            mx.shadowBlur = 6;
            mx.fillText('E total = ' + Etotal.toFixed(2) + ' J', c.padL + 6, yE - 8);
            mx.shadowBlur = 0;
            mx.restore();

            // ── Turning point lines (gray dashed) ──
            mx.save();
            mx.setLineDash([6, 4]);
            mx.strokeStyle = 'rgba(192,132,252,0.15)';
            mx.lineWidth = 1;
            const pxA1 = c.xToP(-Acm), pxA2 = c.xToP(Acm);
            mx.beginPath(); mx.moveTo(pxA1, c.padT); mx.lineTo(pxA1, y0); mx.stroke();
            mx.beginPath(); mx.moveTo(pxA2, c.padT); mx.lineTo(pxA2, y0); mx.stroke();
            mx.setLineDash([]);
            // Labels
            mx.fillStyle = 'rgba(192,132,252,0.5)';
            mx.font = 'bold 10px "JetBrains Mono",monospace';
            mx.textAlign = 'center';
            mx.shadowColor = 'rgba(192,132,252,0.3)';
            mx.shadowBlur = 4;
            mx.fillText('−A', pxA1, y0 + 26);
            mx.fillText('+A', pxA2, y0 + 26);
            mx.shadowBlur = 0;
            mx.restore();

            // ── Current position: energy bars ──
            const pxCur = c.xToP(xcm);
            const pyEp = c.eToP(Ep);
            const pyEt = c.eToP(Etotal);

            // ── NEON MOTION TRAIL ──
            // Record current position into trail buffer
            if (S.running) {
                S.trail.push({ px: pxCur, pyP: pyEp, y0: y0 });
                if (S.trail.length > S.trailMax) S.trail.shift();
            }

            // Draw trail: fading ghost dots on parabola + x-axis
            mx.save();
            for (let i = 0; i < S.trail.length; i++) {
                const tr = S.trail[i];
                const age = i / S.trail.length; // 0=oldest, ~1=newest
                const alpha = age * age * 0.6;  // quadratic fade-in
                const size = 2 + age * 4;       // grow towards newest

                // Ghost dot on parabola (blue neon trail)
                mx.globalAlpha = alpha;
                mx.shadowColor = 'rgba(96,165,250,' + (alpha * 0.8) + ')';
                mx.shadowBlur = 8 + age * 6;
                mx.fillStyle = '#60a5fa';
                mx.beginPath(); mx.arc(tr.px, tr.pyP, size * 0.7, 0, Math.PI * 2); mx.fill();

                // Ghost dot on x-axis (purple neon trail)
                mx.shadowColor = 'rgba(192,132,252,' + (alpha * 0.7) + ')';
                mx.shadowBlur = 8 + age * 8;
                mx.fillStyle = '#c084fc';
                mx.beginPath(); mx.arc(tr.px, tr.y0, size * 0.6, 0, Math.PI * 2); mx.fill();
            }
            mx.globalAlpha = 1;
            mx.shadowBlur = 0;

            // Draw connecting trail line on parabola (neon ribbon)
            if (S.trail.length > 2) {
                mx.beginPath();
                mx.moveTo(S.trail[0].px, S.trail[0].pyP);
                for (let i = 1; i < S.trail.length; i++) {
                    mx.lineTo(S.trail[i].px, S.trail[i].pyP);
                }
                mx.strokeStyle = 'rgba(96,165,250,0.2)';
                mx.lineWidth = 3;
                mx.shadowColor = 'rgba(96,165,250,0.3)';
                mx.shadowBlur = 10;
                mx.stroke();
                mx.shadowBlur = 0;

                // Same for x-axis trail
                mx.beginPath();
                mx.moveTo(S.trail[0].px, S.trail[0].y0);
                for (let i = 1; i < S.trail.length; i++) {
                    mx.lineTo(S.trail[i].px, S.trail[i].y0);
                }
                mx.strokeStyle = 'rgba(192,132,252,0.15)';
                mx.lineWidth = 3;
                mx.shadowColor = 'rgba(192,132,252,0.25)';
                mx.shadowBlur = 8;
                mx.stroke();
                mx.shadowBlur = 0;
            }
            mx.restore();

            // PE bar (blue/purple neon)
            mx.save();
            const peGrad = mx.createLinearGradient(pxCur, y0, pxCur, pyEp);
            peGrad.addColorStop(0, 'rgba(167,139,250,0.05)');
            peGrad.addColorStop(1, 'rgba(167,139,250,0.25)');
            mx.fillStyle = peGrad;
            mx.fillRect(pxCur - 4, pyEp, 8, y0 - pyEp);
            mx.strokeStyle = '#a78bfa';
            mx.lineWidth = 2.5;
            mx.shadowColor = 'rgba(167,139,250,0.6)';
            mx.shadowBlur = 10;
            mx.beginPath(); mx.moveTo(pxCur, y0); mx.lineTo(pxCur, pyEp); mx.stroke();
            mx.shadowBlur = 0;
            mx.restore();

            // KE bar (pink/red neon)
            if (Ek > 0.001) {
                mx.save();
                const keGrad = mx.createLinearGradient(pxCur, pyEp, pxCur, pyEt);
                keGrad.addColorStop(0, 'rgba(251,113,133,0.3)');
                keGrad.addColorStop(1, 'rgba(251,113,133,0.05)');
                mx.fillStyle = keGrad;
                mx.fillRect(pxCur - 4, pyEt, 8, pyEp - pyEt);
                mx.strokeStyle = '#fb7185';
                mx.lineWidth = 2.5;
                mx.shadowColor = 'rgba(251,113,133,0.6)';
                mx.shadowBlur = 10;
                mx.beginPath(); mx.moveTo(pxCur, pyEp); mx.lineTo(pxCur, pyEt); mx.stroke();
                mx.shadowBlur = 0;
                mx.restore();
            }

            // ── Particle dot on x-axis ──
            mx.save();
            // Outer glow ring
            mx.shadowColor = 'rgba(192,132,252,0.7)';
            mx.shadowBlur = 20;
            mx.fillStyle = 'rgba(192,132,252,0.15)';
            mx.beginPath(); mx.arc(pxCur, y0, 12, 0, Math.PI * 2); mx.fill();
            mx.shadowBlur = 0;
            // Main dot
            mx.shadowColor = 'rgba(192,132,252,0.8)';
            mx.shadowBlur = 15;
            mx.fillStyle = '#c084fc';
            mx.beginPath(); mx.arc(pxCur, y0, 7, 0, Math.PI * 2); mx.fill();
            mx.shadowBlur = 0;
            // white inner
            mx.fillStyle = '#fff';
            mx.beginPath(); mx.arc(pxCur, y0, 2.5, 0, Math.PI * 2); mx.fill();
            mx.restore();

            // ── Dot on parabola ──
            mx.save();
            mx.shadowColor = 'rgba(96,165,250,0.7)';
            mx.shadowBlur = 14;
            mx.fillStyle = '#60a5fa';
            mx.beginPath(); mx.arc(pxCur, pyEp, 5, 0, Math.PI * 2); mx.fill();
            mx.shadowBlur = 0;
            mx.fillStyle = '#fff';
            mx.beginPath(); mx.arc(pxCur, pyEp, 2, 0, Math.PI * 2); mx.fill();
            mx.restore();

            // ── Velocity arrow on x-axis ──
            if (Math.abs(S.v) > 0.005) {
                mx.save();
                const arrowLen = Math.min(Math.abs(S.v) * 25, 60) * Math.sign(S.v);
                const ax1 = pxCur, ay = y0 - 20;
                const ax2 = pxCur + arrowLen;
                mx.strokeStyle = '#facc15';
                mx.fillStyle = '#facc15';
                mx.lineWidth = 2.5;
                mx.lineCap = 'round';
                mx.shadowColor = 'rgba(250,204,21,0.5)';
                mx.shadowBlur = 8;
                mx.beginPath(); mx.moveTo(ax1, ay); mx.lineTo(ax2, ay); mx.stroke();
                // Head
                const dir = Math.sign(arrowLen);
                mx.beginPath();
                mx.moveTo(ax2, ay);
                mx.lineTo(ax2 - dir * 8, ay - 5);
                mx.lineTo(ax2 - dir * 8, ay + 5);
                mx.closePath(); mx.fill();
                mx.shadowBlur = 0;
                // label
                mx.font = 'bold 9px "JetBrains Mono",monospace';
                mx.textAlign = 'center';
                mx.fillText('v⃗', pxCur + arrowLen / 2, ay - 9);
                mx.restore();
            }

            // ── Energy labels near bars ──
            mx.save();
            mx.font = 'bold 10px "JetBrains Mono",monospace';
            mx.textAlign = 'left';
            if (Ep > c.Emax * 0.03) {
                mx.fillStyle = '#a78bfa';
                mx.shadowColor = 'rgba(167,139,250,0.4)';
                mx.shadowBlur = 4;
                mx.fillText('Ep=' + Ep.toFixed(2) + ' J', pxCur + 12, (y0 + pyEp) / 2 + 4);
            }
            if (Ek > c.Emax * 0.03) {
                mx.fillStyle = '#fb7185';
                mx.shadowColor = 'rgba(251,113,133,0.4)';
                mx.shadowBlur = 4;
                mx.fillText('Ek=' + Ek.toFixed(2) + ' J', pxCur + 12, (pyEp + pyEt) / 2 + 4);
            }
            mx.shadowBlur = 0;
            mx.restore();

            // ── Fancy ruler at bottom ──
            mx.save();
            const ry = y0 + 30;
            mx.fillStyle = 'rgba(255,255,255,.02)';
            mx.fillRect(c.padL - 5, ry, c.plotW + 10, 20);
            mx.strokeStyle = 'rgba(255,255,255,.1)';
            mx.lineWidth = 1;
            mx.beginPath(); mx.moveTo(c.padL, ry); mx.lineTo(W - c.padR, ry); mx.stroke();
            mx.fillStyle = 'rgba(255,255,255,.2)';
            mx.font = '8px "JetBrains Mono",monospace';
            mx.textAlign = 'center';
            for (let t = -Math.floor(c.maxXcm); t <= c.maxXcm; t++) {
                const px = c.xToP(t);
                if (px < c.padL || px > W - c.padR) continue;
                const big = t % 10 === 0;
                const med = t % 5 === 0;
                mx.strokeStyle = big ? 'rgba(255,255,255,.2)' : med ? 'rgba(255,255,255,.1)' : 'rgba(255,255,255,.05)';
                mx.beginPath(); mx.moveTo(px, ry); mx.lineTo(px, ry + (big ? 10 : med ? 6 : 3)); mx.stroke();
                if (big && t !== 0) mx.fillText(t, px, ry + 18);
            }
            // particle on ruler
            mx.fillStyle = '#818cf8';
            mx.beginPath(); mx.moveTo(pxCur, ry); mx.lineTo(pxCur - 4, ry + 10); mx.lineTo(pxCur + 4, ry + 10); mx.closePath(); mx.fill();
            mx.restore();
        }

        // ═══════════════════════════════════════
        // SMALL GRAPHS (bottom panel)
        // ═══════════════════════════════════════
        const gConfigs = [
            { id: 'gX', key: 'x', color: '#818cf8', label: 'x (m)', scale: 1 },
            { id: 'gV', key: 'v', color: '#34d399', label: 'v (m/s)', scale: 1 },
            { id: 'gA', key: 'a', color: '#fbbf24', label: 'a (m/s²)', scale: 1 },
            { id: 'gKE', key: 'ke', color: '#22d3ee', label: 'Ek (J)', scale: 1 },
            { id: 'gPE', key: 'pe', color: '#f472b6', label: 'Ep (J)', scale: 1 }
        ];

        function drawSmallGraph(cfg) {
            const cv = document.getElementById(cfg.id);
            const ct = cv.getContext('2d');
            const r = cv.parentElement.getBoundingClientRect();
            const gw = r.width, gh = r.height;
            cv.width = gw * dp; cv.height = gh * dp;
            ct.setTransform(dp, 0, 0, dp, 0, 0);
            ct.clearRect(0, 0, gw, gh);

            // bg
            ct.fillStyle = '#050510';
            ct.fillRect(0, 0, gw, gh);

            const h = S.hist;
            const data = h[cfg.key];
            if (!data || data.length < 2) return;

            // Auto-range y
            let yMin = Infinity, yMax = -Infinity;
            for (let i = 0; i < data.length; i++) {
                if (data[i] < yMin) yMin = data[i];
                if (data[i] > yMax) yMax = data[i];
            }
            if (cfg.key === 'ke' || cfg.key === 'pe') { yMin = 0; }
            const yRange = (yMax - yMin) || 1;
            const margin = yRange * 0.15;
            yMin -= margin; yMax += margin;

            // Auto-range t
            const tMin = h.t[0];
            const tMax = h.t[h.t.length - 1];
            const tRange = (tMax - tMin) || 1;

            const pad = 6;

            // Zero line
            if (yMin < 0 && yMax > 0) {
                const zy = pad + (gh - 2 * pad) * (1 - (0 - yMin) / (yMax - yMin));
                ct.strokeStyle = 'rgba(255,255,255,0.08)';
                ct.lineWidth = 0.5;
                ct.beginPath(); ct.moveTo(pad, zy); ct.lineTo(gw - pad, zy); ct.stroke();
            }

            // Horizontal grid
            ct.strokeStyle = 'rgba(255,255,255,0.03)';
            ct.lineWidth = 0.5;
            for (let i = 0; i < 5; i++) {
                const gy = pad + (gh - 2 * pad) * i / 4;
                ct.beginPath(); ct.moveTo(pad, gy); ct.lineTo(gw - pad, gy); ct.stroke();
            }

            // Curve
            ct.beginPath();
            let started = false;
            for (let i = 0; i < data.length; i++) {
                const px = pad + ((h.t[i] - tMin) / tRange) * (gw - 2 * pad);
                const py = pad + (gh - 2 * pad) * (1 - (data[i] - yMin) / (yMax - yMin));
                if (!started) { ct.moveTo(px, py); started = true } else ct.lineTo(px, py);
            }
            ct.strokeStyle = cfg.color;
            ct.lineWidth = 1.5;
            ct.lineJoin = 'round';
            ct.stroke();

            // Glow
            ct.globalAlpha = 0.1;
            ct.lineWidth = 5;
            ct.stroke();
            ct.globalAlpha = 1;

            // Current value dot
            if (data.length > 0) {
                const last = data[data.length - 1];
                const lx = gw - pad;
                const ly = pad + (gh - 2 * pad) * (1 - (last - yMin) / (yMax - yMin));
                ct.fillStyle = cfg.color;
                ct.beginPath(); ct.arc(lx, ly, 3, 0, Math.PI * 2); ct.fill();
            }
        }

        // ═══════════════════════════════════════
        // PHYSICS STEP
        // ═══════════════════════════════════════
        function step() {
            const w = omega();
            // Analytical solution for perfect accuracy
            S.t += S.dt;
            S.x = S.A * Math.cos(w * S.t);
            S.v = -S.A * w * Math.sin(w * S.t);
            const a = -w * w * S.x;
            const ke = 0.5 * S.m * S.v * S.v;
            const pe = 0.5 * S.k * S.x * S.x;

            const h = S.hist;
            h.t.push(S.t); h.x.push(S.x); h.v.push(S.v);
            h.a.push(a); h.ke.push(ke); h.pe.push(pe);
            if (h.t.length > S.maxH) {
                h.t.shift(); h.x.shift(); h.v.shift(); h.a.shift(); h.ke.shift(); h.pe.shift();
            }

            return { a, ke, pe };
        }

        // ═══════════════════════════════════════
        // CONTROLS
        // ═══════════════════════════════════════
        const sA = document.getElementById('sA'), sK = document.getElementById('sK'), sM = document.getElementById('sM');
        sA.oninput = () => { S.A = +sA.value / 100; document.getElementById('vA').textContent = sA.value; updateDerived(); };
        sK.oninput = () => { S.k = +sK.value; document.getElementById('vK').textContent = sK.value; updateDerived(); };
        sM.oninput = () => { S.m = +sM.value; document.getElementById('vM').textContent = (+sM.value).toFixed(1); updateDerived(); };

        function updateDerived() {
            document.getElementById('wChip').textContent = omega().toFixed(3);
            document.getElementById('TChip').textContent = period().toFixed(3);
            const Et = 0.5 * S.k * S.A * S.A;
            document.getElementById('dET').textContent = Et.toFixed(2);
        }
        updateDerived();

        function toggleSim() {
            S.running = !S.running;
            const btn = document.getElementById('btnPlay');
            const txt = document.getElementById('btnPlayText');
            if (S.running) {
                btn.innerHTML = '<i class="fa-solid fa-pause"></i> <span id="btnPlayText">Pausar</span>';
                btn.classList.add('active');
                document.getElementById('sDot').style.background = 'var(--grn)';
                document.getElementById('sText').textContent = 'Simulando';
            } else {
                btn.innerHTML = '<i class="fa-solid fa-play"></i> <span id="btnPlayText">Iniciar</span>';
                btn.classList.remove('active');
                document.getElementById('sDot').style.background = 'var(--ylw)';
                document.getElementById('sText').textContent = 'Pausado';
            }
        }

        function resetSim() {
            S.x = S.A; S.v = 0; S.t = 0; S.running = false;
            document.getElementById('btnPlay').innerHTML = '<i class="fa-solid fa-play"></i> <span id="btnPlayText">Iniciar</span>';
            document.getElementById('btnPlay').classList.remove('active');
            document.getElementById('sDot').style.background = 'var(--ylw)';
            document.getElementById('sText').textContent = 'Pausado';
            clearHist();
            updateData(0, 0.5 * S.k * S.A * S.A);
        }

        function clearHist() {
            S.hist = { t: [], x: [], v: [], a: [], ke: [], pe: [] };
            S.trail = [];
        }

        function updateData(a, pe) {
            const ke = 0.5 * S.m * S.v * S.v;
            document.getElementById('dX').textContent = (S.x * 100).toFixed(2);
            document.getElementById('dV').textContent = S.v.toFixed(3);
            document.getElementById('dAcc').textContent = a.toFixed(3);
            document.getElementById('dKE').textContent = ke.toFixed(3);
            document.getElementById('dPE').textContent = pe.toFixed(3);
            document.getElementById('dET').textContent = (ke + pe).toFixed(3);
            document.getElementById('tChip').textContent = S.t.toFixed(3);
        }

        // ═══════════════════════════════════════
        // MAIN LOOP
        // ═══════════════════════════════════════
        function loop() {
            if (S.running) {
                const r = step();
                updateData(r.a, r.pe);
            }
            drawMain();
            gConfigs.forEach(drawSmallGraph);
            requestAnimationFrame(loop);
        }

        // Init position at +A
        S.x = S.A; S.v = 0;
        updateData(0, 0.5 * S.k * S.A * S.A);

        // AUTO-START ON LOAD
        setTimeout(() => {
            if (!S.running) toggleSim();
        }, 500);

        loop();

        // KaTeX (if loaded)
        addEventListener('load', () => {
            if (typeof renderMathInElement === 'function') {
                // nothing right now, formulas are inline
            }
        });
    </script>
